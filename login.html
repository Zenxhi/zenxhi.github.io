<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Product Store</title>
    <link rel="stylesheet" href="login.css">
</head>
<body>

    <!-- Theme Toggle -->
    <button class="theme-toggle" id="themeToggle">🌙</button>

    <!-- Logo -->
    <a href="index.html" style="text-decoration: none;">
        <div class="site-logo">🌟</div>
    </a>

    <!-- Card Wrapper -->
    <div class="card-container">
        <div class="card-slider" id="cardSlider">

            <!-- Login Panel -->
            <div class="card" id="loginCard">
                <h2>Log In</h2>
                <input type="text" placeholder="Username">
                <input type="password" placeholder="Password">
                <div class="forgot"><a href="#">Forgot your password?</a></div>
                <button class="btn-primary" onclick="handleLogin()">Log In</button>
                <button class="btn-secondary" onclick="slideTo('signup')">Sign Up</button>
            </div>

            <!-- Sign Up Panel -->
            <div class="card" id="signupCard">
                <h2>Sign Up</h2>
                <input type="text" placeholder="Username">
                <input type="email" placeholder="Email">
                <input type="password" placeholder="Password">
                <input type="password" placeholder="Confirm Password">
                <button class="btn-primary" onclick="window.location.href='index.html'">Sign Up</button>
                <button class="btn-secondary" onclick="slideTo('login')">Back to Log In</button>
            </div>

        </div>
    </div>

    <script>
        // Theme
        const themeToggle = document.getElementById('themeToggle');
        const currentTheme = localStorage.getItem('theme') || 'light';

        if (currentTheme === 'dark') {
            document.body.classList.add('dark-mode');
            themeToggle.textContent = '☀️';
        }

        themeToggle.addEventListener('click', () => {
            document.body.classList.toggle('dark-mode');
            if (document.body.classList.contains('dark-mode')) {
                localStorage.setItem('theme', 'dark');
                themeToggle.textContent = '☀️';
            } else {
                localStorage.setItem('theme', 'light');
                themeToggle.textContent = '🌙';
            }
        });

        // Slide transition
        function slideTo(panel) {
            const slider = document.getElementById('cardSlider');
            if (panel === 'signup') {
                slider.style.transform = 'translateX(-50%)';
            } else {
                slider.style.transform = 'translateX(0%)';
            }
        }
        function handleLogin() {
            const username = document.querySelector('#loginCard input[type="text"]').value.trim();
            if (username) {
            localStorage.setItem('username', username);
            }
            window.location.href = 'index.html';
}
    </script>
</body>
</html>
