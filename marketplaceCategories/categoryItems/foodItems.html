<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Food Items</title>
    <link rel="stylesheet" href="../../../marketplace.css">
    <style>
        .empty-message {
            text-align: center;
            padding: 60px 20px;
            font-size: 24px;
            color: #999;
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header>
        <div class="header-left">
            <button class="menu-toggle" id="menuToggle">☰</button>
            <a href="../../../index.html" style="text-decoration: none;">
                <div class="logo">🌟</div>
            </a>
            <button class="theme-toggle" id="themeToggle">🌙</button>
        </div>
        <div class="search-container">
            <input type="text" placeholder="Search Product">
        </div>
        <div class="header-icons">
            <div>💬 Contact Us</div>
            <div>📍 Location</div>
            <div>🛒 Cart (0)</div>
            <div>👤 Account</div>
        </div>
    </header>

    <!-- Sidebar Menu -->
    <div class="sidebar" id="sidebar">
        <ul class="sidebar-menu">
            <li><a href="../../../index.html"> Home</a></li>
            <li><a href="../../Marketplace.html"> Marketplace </a></li>
            <li><a href="#"> Lost and Found</a></li>
            <li><a href="#"> History </a></li>
            <li><a href="#">💳 Orders</a></li>
            <li><a href="#">⚙️ Settings</a></li>
            <li><a href="#">❓ Help & Support</a></li>
        </ul>
    </div>
    <div class="overlay" id="overlay"></div>

    <!-- Main Content -->
    <div class="container">
        <div class="categories-section">
            <div class="section-header">
                <a href="../Food.html" style="text-decoration: none; color: inherit;">
                <h2>Food Items</h2>
                </a>
            </div>
            <div class="empty-message">No items yet</div>
        </div>
    </div>

    <!-- Chat Container -->
    <div class="chat-container">
        <button class="chat-icon" id="chatIcon">💬</button>
        <div class="chat-list" id="chatList">
            <div class="chat-list-header">
                <h3>Messages</h3>
                <button class="close-btn" id="closeListBtn">✕</button>
            </div>
            <div class="chat-history" id="chatHistory"></div>
        </div>
        <div class="chat-window" id="chatWindow">
            <div class="chat-window-header">
                <div class="chat-window-header-info">
                    <div class="chat-window-avatar" id="chatAvatar">A</div>
                    <div class="chat-window-name" id="chatName">Alice</div>
                </div>
                <button class="close-btn" id="closeChatBtn">✕</button>
            </div>
            <div class="chat-messages" id="chatMessages"></div>
            <div class="chat-input-area">
                <input type="text" class="chat-input" id="messageInput" placeholder="Type a message...">
                <button class="send-btn" id="sendBtn">➤</button>
            </div>
        </div>
    </div>

    <script src="../../../index.js"></script>
</body>
</html>
