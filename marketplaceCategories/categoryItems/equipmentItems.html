<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Equipment Items</title>
    <link rel="stylesheet" href="../../marketplace.css">
    <style>
        .search-bar-section { margin: 20px 0 10px; display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
        .search-bar-section input { flex: 1; min-width: 200px; padding: 10px 18px; border-radius: 25px; border: 1px solid #ddd; font-size: 14px; background: #f9f9f9; box-shadow: 0 2px 6px rgba(0,0,0,0.1); }
        body.dark-mode .search-bar-section input { background: #2d2d2d; border-color: #555; color: #e5e5e5; }
        .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 24px; margin-top: 20px; }
        .product-card { background: #fff; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); overflow: hidden; display: flex; flex-direction: column; transition: transform 0.2s, box-shadow 0.2s; }
        body.dark-mode .product-card { background: #2d2d2d; }
        .product-card:hover { transform: translateY(-4px); box-shadow: 0 6px 20px rgba(0,0,0,0.14); }
        .product-img { width: 100%; height: 180px; background: #f0f0f0; display: flex; align-items: center; justify-content: center; color: #aaa; font-size: 14px; overflow: hidden; }
        body.dark-mode .product-img { background: #3a3a3a; }
        .product-img img { width: 100%; height: 100%; object-fit: cover; }
        .product-info { padding: 14px 16px; flex: 1; display: flex; flex-direction: column; gap: 6px; }
        .product-name { font-size: 15px; font-weight: 700; color: #222; }
        body.dark-mode .product-name { color: #e5e5e5; }
        .product-price { font-size: 16px; font-weight: 700; color: #d4a800; }
        .product-desc { font-size: 12px; color: #777; line-height: 1.4; }
        body.dark-mode .product-desc { color: #aaa; }
        .product-seller { font-size: 12px; color: #999; }
        .product-actions { padding: 10px 16px 14px; display: flex; gap: 8px; }
        .btn-cart { flex: 1; padding: 9px; border-radius: 20px; border: none; background: #ffd000; color: #1a1a1a; font-weight: 700; font-size: 13px; cursor: pointer; transition: background 0.2s; }
        .btn-cart:hover { background: #e6bb00; }
        .btn-remove { padding: 9px 12px; border-radius: 20px; border: 2px solid #e74c3c; background: transparent; color: #e74c3c; font-size: 12px; font-weight: 600; cursor: pointer; transition: background 0.2s, color 0.2s; }
        .btn-remove:hover { background: #e74c3c; color: #fff; }
        .add-listing-btn { background: #ffd000; border: none; border-radius: 10px; padding: 10px 20px; font-size: 14px; font-weight: 700; cursor: pointer; color: #1a1a1a; white-space: nowrap; }
        .add-listing-btn:hover { background: #e6bb00; }
        .empty-message { text-align: center; padding: 60px 20px; font-size: 20px; color: #999; }
        .modal-backdrop { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 2000; align-items: center; justify-content: center; }
        .modal-backdrop.active { display: flex; }
        .modal { background: #fff; border-radius: 16px; padding: 32px 28px; width: 90%; max-width: 480px; box-shadow: 0 8px 40px rgba(0,0,0,0.2); display: flex; flex-direction: column; gap: 14px; max-height: 90vh; overflow-y: auto; }
        body.dark-mode .modal { background: #2d2d2d; color: #e5e5e5; }
        .modal h3 { font-size: 20px; font-weight: 700; }
        .modal label { font-size: 13px; font-weight: 600; color: #555; }
        body.dark-mode .modal label { color: #aaa; }
        .modal input, .modal textarea, .modal select { width: 100%; padding: 10px 14px; border-radius: 10px; border: 1px solid #ddd; font-size: 14px; font-family: inherit; background: #f9f9f9; }
        body.dark-mode .modal input, body.dark-mode .modal textarea { background: #3a3a3a; border-color: #555; color: #e5e5e5; }
        .modal textarea { resize: vertical; min-height: 80px; }
        .modal-actions { display: flex; gap: 10px; margin-top: 4px; }
        .btn-confirm { flex: 1; padding: 11px; border-radius: 10px; border: none; background: #ffd000; color: #1a1a1a; font-weight: 700; font-size: 14px; cursor: pointer; }
        .btn-confirm:hover { background: #e6bb00; }
        .btn-cancel { flex: 1; padding: 11px; border-radius: 10px; border: 2px solid #ccc; background: transparent; color: #666; font-size: 14px; cursor: pointer; }
        body.dark-mode .btn-cancel { color: #aaa; border-color: #555; }
        .reason-option { display: flex; align-items: center; gap: 10px; padding: 10px 14px; border-radius: 10px; border: 2px solid #eee; cursor: pointer; transition: border-color 0.2s, background 0.2s; font-size: 14px; }
        body.dark-mode .reason-option { border-color: #444; }
        .reason-option:hover { border-color: #ffd000; background: rgba(255,208,0,0.06); }
        .reason-option.selected { border-color: #ffd000; background: rgba(255,208,0,0.12); }
        .reason-option input[type="radio"] { width: auto; accent-color: #ffd000; }
    </style>
</head>
<body>
    <header>
        <div class="header-left">
            <a href="../../index.html" style="text-decoration: none;"><div class="logo">🌟</div></a>
            <button class="theme-toggle" id="themeToggle">🌙</button>
        </div>
        <div class="search-container">
            <input type="text" placeholder="Search Product">
        </div>
        <div class="header-icons">
            <div>💬 Contact Us</div>
            <div>📍 Location</div>
            <div class="cart-count">🛒 Cart (0)</div>
            <div class="account-btn"><a href="../../login.html" style="text-decoration:none;color:rgb(51,51,51);">👤 Account</a></div>
        </div>
    </header>

    <nav class="left-sidebar">
        <ul class="sidebar-nav-menu">
            <li><a href="../../index.html">Home</a></li>
            <li><a href="../../Marketplace.html">Marketplace</a></li>
            <li><a href="#">Lost and Found</a></li>
            <li><a href="#">History</a></li>
            <li><a href="#">💳 Orders</a></li>
            <li><a href="#">⚙️ Settings</a></li>
            <li><a href="#">❓ Help & Support</a></li>
        </ul>
    </nav>

    <div class="container">
        <div class="categories-section">
            <div class="section-header">
                <a href="../Equipment.html" style="text-decoration:none;color:inherit;"><h2>Equipment Items</h2></a>
            </div>
            <div class="search-bar-section">
                <input type="text" id="productSearch" placeholder="🔍 Search Equipment...">
                <button class="add-listing-btn" onclick="openAddModal()">+ Sell an Item</button>
            </div>
            <div class="products-grid" id="productsGrid"></div>
            <div class="empty-message" id="emptyMsg" style="display:none;">No items found.</div>
        </div>
    </div>

    <div class="chat-container">
        <button class="chat-icon" id="chatIcon">💬</button>
        <div class="chat-list" id="chatList">
            <div class="chat-list-header"><h3>Messages</h3><button class="close-btn" id="closeListBtn">✕</button></div>
            <div class="chat-history" id="chatHistory"></div>
        </div>
        <div class="chat-window" id="chatWindow">
            <div class="chat-window-header">
                <div class="chat-window-header-info">
                    <div class="chat-window-avatar" id="chatAvatar">A</div>
                    <div class="chat-window-name" id="chatName">Alice</div>
                </div>
                <button class="close-btn" id="closeChatBtn">✕</button>
            </div>
            <div class="chat-messages" id="chatMessages"></div>
            <div class="chat-input-area">
                <input type="text" class="chat-input" id="messageInput" placeholder="Type a message...">
                <button class="send-btn" id="sendBtn">➤</button>
            </div>
        </div>
    </div>

    <!-- Add Modal -->
    <div class="modal-backdrop" id="addModal">
        <div class="modal">
            <h3>📦 Sell an Item</h3>
            <label>Product Name *</label>
            <input type="text" id="newName" placeholder="e.g. Equipment item">
            <label>Price (₱) *</label>
            <input type="number" id="newPrice" placeholder="e.g. 15000" min="0">
            <label>Description</label>
            <textarea id="newDesc" placeholder="Describe your item..."></textarea>
            <label>Your Name / Shop Name</label>
            <input type="text" id="newSeller">
            <div class="modal-actions">
                <button class="btn-cancel" onclick="closeAddModal()">Cancel</button>
                <button class="btn-confirm" onclick="submitNewProduct()">List Item</button>
            </div>
        </div>
    </div>

    <!-- Remove Modal -->
    <div class="modal-backdrop" id="removeModal">
        <div class="modal">
            <h3>🗑️ Remove Listing</h3>
            <p style="font-size:14px;color:#777;margin-top:-6px;">Why are you removing this item?</p>
            <div id="reasonOptions" style="display:flex;flex-direction:column;gap:8px;">
                <label class="reason-option" onclick="selectReason(this,'Item has been sold')">
                    <input type="radio" name="reason"> Item has been sold
                </label>
                <label class="reason-option" onclick="selectReason(this,'No longer available')">
                    <input type="radio" name="reason"> No longer available
                </label>
                <label class="reason-option" onclick="selectReason(this,'Price change — will relist')">
                    <input type="radio" name="reason"> Price change — will relist
                </label>
                <label class="reason-option" onclick="selectReason(this,'Listed by mistake')">
                    <input type="radio" name="reason"> Listed by mistake
                </label>
                <label class="reason-option" onclick="selectReason(this,'Other')">
                    <input type="radio" name="reason"> Other
                </label>
            </div>
            <div class="modal-actions">
                <button class="btn-cancel" onclick="closeRemoveModal()">Cancel</button>
                <button class="btn-confirm" style="background:#e74c3c;color:#fff;" onclick="confirmRemove()">Remove</button>
            </div>
        </div>
    </div>

    <script src="../../products.js"></script>
    <script src="../../index.js"></script>
    <script>
        function renderProducts(filter) {
            const grid = document.getElementById('productsGrid');
            const emptyMsg = document.getElementById('emptyMsg');
            let products = getProductsByCategory('electronics');
            if (filter) {
                const q = filter.toLowerCase();
                products = products.filter(p =>
                    p.name.toLowerCase().includes(q) ||
                    p.description.toLowerCase().includes(q) ||
                    p.seller.toLowerCase().includes(q)
                );
            }
            grid.innerHTML = '';
            if (!products.length) { emptyMsg.style.display = 'block'; return; }
            emptyMsg.style.display = 'none';
            products.forEach(function(p) {
                const card = document.createElement('div');
                card.className = 'product-card';
                const imgHTML = p.image
                    ? '<img src="' + p.image + '" alt="' + p.name + '" onerror="this.parentElement.innerHTML=\'📷 No Image\'">'
                    : '📷 No Image';
                card.innerHTML =
                    '<div class="product-img">' + imgHTML + '</div>' +
                    '<div class="product-info">' +
                        '<div class="product-name">' + p.name + '</div>' +
                        '<div class="product-price">₱' + Number(p.price).toLocaleString() + '</div>' +
                        '<div class="product-desc">' + p.description + '</div>' +
                        '<div class="product-seller">🏪 ' + p.seller + '</div>' +
                    '</div>' +
                    '<div class="product-actions">' +
                        '<button class="btn-cart" data-id="' + p.id + '">🛒 Add to Cart</button>' +
                        '<button class="btn-remove" data-id="' + p.id + '">Remove</button>' +
                    '</div>';
                card.querySelector('.btn-cart').addEventListener('click', function() { addToCart(p); });
                card.querySelector('.btn-remove').addEventListener('click', function() { openRemoveModal(p.id); });
                grid.appendChild(card);
            });
        }

        document.getElementById('productSearch').addEventListener('input', function() {
            renderProducts(this.value);
        });

        function openAddModal() {
            document.getElementById('addModal').classList.add('active');
            document.getElementById('newSeller').value = localStorage.getItem('username') || '';
        }
        function closeAddModal() {
            document.getElementById('addModal').classList.remove('active');
            ['newName','newPrice','newDesc'].forEach(function(id) { document.getElementById(id).value = ''; });
        }
        function submitNewProduct() {
            const name = document.getElementById('newName').value.trim();
            const price = parseFloat(document.getElementById('newPrice').value);
            const desc = document.getElementById('newDesc').value.trim();
            const seller = document.getElementById('newSeller').value.trim() || 'Anonymous';
            if (!name) { alert('Please enter a product name.'); return; }
            if (!price || price <= 0) { alert('Please enter a valid price.'); return; }
            const products = getProducts();
            products.push({ id: 'e' + Date.now(), category: 'electronics', name: name, price: price, description: desc, seller: seller, image: null, listed: true });
            saveProducts(products);
            closeAddModal();
            renderProducts();
            showToast('Item listed successfully!');
        }

        var removeTargetId = null;
        var selectedReason = null;
        function openRemoveModal(id) {
            removeTargetId = id;
            selectedReason = null;
            document.querySelectorAll('.reason-option').forEach(function(el) { el.classList.remove('selected'); });
            document.getElementById('removeModal').classList.add('active');
        }
        function closeRemoveModal() {
            document.getElementById('removeModal').classList.remove('active');
            removeTargetId = null;
        }
        function selectReason(el, reason) {
            document.querySelectorAll('.reason-option').forEach(function(o) { o.classList.remove('selected'); });
            el.classList.add('selected');
            selectedReason = reason;
        }
        function confirmRemove() {
            if (!selectedReason) { alert('Please select a reason.'); return; }
            removeProduct(removeTargetId, selectedReason);
            closeRemoveModal();
            renderProducts();
            showToast('Listing removed.');
        }

        renderProducts();
    </script>
</body>
</html>
